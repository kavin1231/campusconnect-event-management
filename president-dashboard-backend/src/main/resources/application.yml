server:
  port: ${SERVER_PORT:8081}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/itpm}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:rootcd}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-strong-minimum-32-char-secret-key}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
